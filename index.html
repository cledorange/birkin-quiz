<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍊知ってる？バーキン検定🍊</title>

<meta property="og:title" content="🍊知ってる？バーキン検定🍊">

<meta property="og:description"
content="あなたは何バーキン？ バーキン通スコアをチェック">

<meta property="og:image"
content="https://cledorange.github.io/birkin-quiz/BirkinQuiz_ogp.png">

<meta property="og:url"
content="https://cledorange.github.io/birkin-quiz/">

<meta property="og:type"
content="website">

<meta name="twitter:card"
content="summary_large_image">

<style>

body{
  margin:0;
  padding:20px;
  background:#f7f3ee;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Hiragino Sans",
    "Yu Gothic",
    sans-serif;
  color:#333;
}

#birkin-quiz{
  max-width:520px;
  margin:40px auto;
  padding:36px 24px;
  background:#fffaf5;
  border-radius:24px;
  box-shadow:0 6px 24px rgba(0,0,0,0.12);
  border:2px solid #f2d2a2;
}

.title{
  text-align:center;
  color:#ff7a00;
  font-size:34px;
  font-weight:bold;
  margin-bottom:20px;
  line-height:1.5;
}

.sub{
  text-align:center;
  color:#666;
  line-height:1.9;
  margin-bottom:32px;
  font-size:18px;
}

#progress{
  text-align:center;
  color:#999;
  margin-bottom:20px;
  font-size:14px;
  letter-spacing:1px;
}

#question{
  font-size:24px;
  line-height:1.8;
  text-align:center;
  min-height:150px;
  margin-bottom:30px;
}

.buttons{
  display:flex;
  gap:16px;
}

.answer-btn{
  flex:1;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#f3e7d8;
  color:#8b5e34;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.15s;
  -webkit-tap-highlight-color: transparent;
  appearance:none;
}

.answer-btn:hover{
  background:#e9d2b6;
}

.answer-btn:active{
  background:#d9b48a;
  color:#fff;
}

.answer-btn:focus{
  outline:none;
}

.answer-btn::-moz-focus-inner{
  border:0;
}

#result{
  display:none;
  text-align:center;
}

.score-label{
  font-size:22px;
  color:#ff7a00;
  font-weight:bold;
  margin-bottom:12px;
}

#score{
  font-size:54px;
  font-weight:bold;
  color:#ff7a00;
  margin-bottom:18px;
  line-height:1.2;
}

#rank{
  font-size:28px;
  font-weight:bold;
  color:#8b5e34;
  margin-bottom:24px;
}

.share-btn{
  display:inline-block;
  padding:16px 28px;
  background:#ff7a00;
  color:white;
  text-decoration:none;
  border-radius:999px;
  font-size:18px;
  font-weight:bold;
  transition:0.2s;
  border:none;
  cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}

.share-btn:hover{
  opacity:0.85;
}

.share-btn:focus{
  outline:none;
}

@media screen and (max-width:600px){

  #birkin-quiz{
    padding:28px 18px;
  }

  .title{
    font-size:28px;
  }

  #question{
    font-size:21px;
    min-height:140px;
  }

}

</style>
</head>

<body>

<div id="birkin-quiz">

  <div class="title">
    🍊知ってる？バーキン検定🍊
  </div>

  <div class="sub">
    あなたは何バーキン？<br>
    バーキン通スコアをチェック
  </div>

  <div id="progress"></div>

  <div id="question"></div>

  <div class="buttons">

    <button class="answer-btn" id="yesBtn">
      YES
    </button>

    <button class="answer-btn" id="noBtn">
      NO
    </button>

  </div>

  <div id="result">

    <div class="score-label">
      あなたのバーキン通スコア
    </div>

    <div id="score"></div>

    <div id="rank"></div>

    <button
      id="shareBtn"
      class="share-btn"
    >
      結果をシェア
    </button>

  </div>

</div>

<script>

const questions = [

  {
    text:"「バーキン」は、ジェーン・バーキンとエルメス元社長との偶然の出会いから誕生した",
    yes:20,
    no:0
  },

  {
    text:"バーキン付属の南京錠は「カデナ」と呼ばれている",
    yes:20,
    no:0
  },

  {
    text:"バーキンにはショルダーストラップが付属している",
    yes:0,
    no:20
  },

  {
    text:"バーキンの代表的なサイズ展開は25、30、32、40である",
    yes:0,
    no:20
  },

  {
    text:"バーキンの中でも特に高額で有名なのが「ヒマラヤ」である",
    yes:20,
    no:0
  }

];

let current = 0;
let total = 0;

const progress =
  document.getElementById("progress");

const question =
  document.getElementById("question");

const yesBtn =
  document.getElementById("yesBtn");

const noBtn =
  document.getElementById("noBtn");

function resetButtonState(){

  yesBtn.blur();
  noBtn.blur();

}

function showQuestion(){

  resetButtonState();

  progress.innerHTML =
    "QUESTION " +
    (current + 1) +
    " / " +
    questions.length;

  question.innerHTML =
    questions[current].text;
}

function answer(type){

  if(type === "yes"){
    total += questions[current].yes;
  }else{
    total += questions[current].no;
  }

  resetButtonState();

  current++;

  setTimeout(function(){

    if(current < questions.length){

      showQuestion();

    }else{

      showResult();

    }

  }, 120);

}

function showResult(){

  progress.style.display = "none";
  question.style.display = "none";

  document.querySelector(".buttons")
    .style.display = "none";

  document.getElementById("result")
    .style.display = "block";

  document.getElementById("score")
    .innerHTML = total + "バーキン";

  let rankText = "";

  if(total === 100){

    rankText = "バーキンマスター🍊";

  }else if(total >= 60){

    rankText = "バーキン上級者🍊";

  }else if(total === 0){

    rankText = "これからバーキン🍊";

  }else{

    rankText = "バーキン好き🍊";

  }

  document.getElementById("rank")
    .innerHTML = rankText;
}

yesBtn.addEventListener(
  "click",
  function(){
    answer("yes");
  }
);

noBtn.addEventListener(
  "click",
  function(){
    answer("no");
  }
);

document.getElementById("shareBtn")
  .addEventListener("click", async function(){

    const shareData = {
      title: "🍊知ってる？バーキン検定🍊",
      text:
        "私は " +
        total +
        "バーキンでした！",
      url:
        "https://cledorange.github.io/birkin-quiz/"
    };

    if(navigator.share){

      try{

        await navigator.share(shareData);

      }catch(err){

        console.log(err);

      }

    }else{

      alert("このブラウザではシェア機能に対応していません");

    }

  });

showQuestion();

</script>

</body>
</html>
